name: Validate Toolkit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate toolkit
        run: node scripts/validate-toolkit.mjs

      - name: Check source freshness mock
        run: node scripts/check-source-freshness.mjs --mock
